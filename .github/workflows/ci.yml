name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tsc --noEmit (strict, erasable) + eve build. The canonical gate.
      - name: pnpm check
        run: pnpm check

      # Biome lint (biome.jsonc; lint-only, no formatting).
      - name: pnpm lint
        run: pnpm lint

      # docs/env-reference.md must match the CLANKY_* reads in the source.
      - name: env reference is current
        run: pnpm env:reference --check

  smoke:
    name: Smoke (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Offline, deterministic smoke tests. scripts/run-smoke.ts globs
      # test/*-smoke.ts and skips the live-gated set (credentials, live
      # Herdr/eve/Discord, TTY); run those locally via their `pnpm smoke:*`
      # scripts. New offline smoke tests are picked up automatically.
      - name: pnpm smoke
        run: pnpm smoke
