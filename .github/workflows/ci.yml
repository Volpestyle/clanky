name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tsc --noEmit (strict, erasable) + eve build. The canonical gate.
      - name: pnpm check
        run: pnpm check

  smoke:
    name: Smoke (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Offline, deterministic smoke tests only. Tests gated on live
      # credentials (model / Discord / relay / voice / media / MCP) are
      # excluded; run those locally with their `pnpm smoke:*` scripts.
      - name: Run offline smoke tests
        run: |
          set -euo pipefail
          tests=(
            banner-smoke
            tui-no-reply-smoke
            tui-input-request-queue-smoke
            tui-session-store-smoke
            tui-attachments-smoke
            tui-prompt-history-smoke
            tui-context-status-smoke
            port-config-smoke
            transcript-registry-smoke
            transcript-file-tail-smoke
            transcript-run-smoke
            capabilities-smoke
            approvals-smoke
            agent-md-smoke
            agent-spinners-smoke
            local-context-smoke
            clanky-face-renderer-smoke
            clanky-face-layout-smoke
            clanky-autocomplete-smoke
            clanky-interactive-flow-smoke
            clanky-transcript-block-smoke
            clanky-transcript-key-routing-smoke
            clanky-transcript-viewport-smoke
            clanky-tui-ledger-smoke
            clanky-sgr-mouse-smoke
            clanky-clipboard-smoke
            clanky-skills-smoke
            clanky-skills-panel-smoke
            clanky-pairing-smoke
            clanky-chrome-selection-smoke
            clanky-command-result-smoke
            clanky-face-bash-smoke
            herdr-spawn-argv-smoke
            herdr-send-routing-smoke
            herdr-placement-smoke
            discord-gateway-status-smoke
            voice-config-smoke
            voice-control-smoke
            voice-fault-smoke
          )
          for t in "${tests[@]}"; do
            echo "::group::$t"
            node "test/$t.ts"
            echo "::endgroup::"
          done
