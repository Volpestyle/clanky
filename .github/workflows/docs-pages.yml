name: Docs Pages

on:
  push:
    branches:
      - main
      - master
      - v2-vanilla
    paths:
      - ".github/workflows/docs-pages.yml"
      - "apps/docs/**"
      - "docs/**"
      - "README.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
  workflow_dispatch:

jobs:
  docs-pages:
    permissions:
      contents: read
    uses: Volpestyle/docs/.github/workflows/docs-pages.yml@main
    with:
      docs-base-path: /docs/clanky/
      site-slug: clanky
      node-version: "22"
      pnpm-version: "10.33.4"
      prepare-command: |
        mkdir -p ../agent-room/packages/integrations/chat-discord
        printf '%s\n' '{"name":"@agentroom/chat-discord","version":"0.0.0","type":"module","exports":{".":"./index.js"},"dependencies":{"@modelcontextprotocol/sdk":"^1.29.0","ws":"^8.20.1","zod":"^4.4.3"}}' > ../agent-room/packages/integrations/chat-discord/package.json
        printf '%s\n' 'export {};' > ../agent-room/packages/integrations/chat-discord/index.js
        mkdir -p ../discord_mcp
        printf '%s\n' '{"name":"discord-mcp","version":"0.0.0","type":"module","bin":{"discord-mcp":"index.js"},"engines":{"node":">=22.19.0"},"dependencies":{"@modelcontextprotocol/sdk":"^1.29.0","tsx":"^4.22.3","zod":"^3.25.76"}}' > ../discord_mcp/package.json
        printf '%s\n' '#!/usr/bin/env node' > ../discord_mcp/index.js
    secrets:
      docs-publish-key: ${{ secrets.DOCS_PUBLISH_KEY }}
