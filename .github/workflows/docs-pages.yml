name: Docs Pages

on:
  push:
    branches:
      - main
      - master
      - v2-vanilla
    paths:
      - ".github/workflows/docs-pages.yml"
      - "apps/docs/**"
      - "docs/**"
      - "packages/agent-docs/**"
      - "README.md"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs-pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.4 --activate

      - name: Prepare local file dependencies
        run: |
          mkdir -p ../discord_mcp
          printf '%s\n' '{"name":"discord-mcp","version":"0.0.0","type":"module","bin":{"discord-mcp":"index.js"},"engines":{"node":">=22.19.0"},"dependencies":{"@modelcontextprotocol/sdk":"^1.29.0","tsx":"^4.22.3","zod":"^3.25.76"}}' > ../discord_mcp/package.json
          printf '%s\n' '#!/usr/bin/env node' > ../discord_mcp/index.js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build
        env:
          DOCS_BASE_PATH: /clanky/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
